name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install native deps for keytar
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 pkg-config libsecret-1-dev

      - name: Install dependencies
        run: npm ci

      - name: Smoke check (CLI help)
        run: npm run smoke
